name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: postgresql://stamporama:stamporama@localhost:5433/stamporama_test
  BETTER_AUTH_URL: http://127.0.0.1:3000
  BETTER_AUTH_SECRET: stamporama-ci-auth-secret-value

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run unit tests
        run: pnpm test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stamporama
          POSTGRES_PASSWORD: stamporama
          POSTGRES_DB: stamporama_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U stamporama -d stamporama_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy

      - name: Run integration tests
        run: pnpm exec tsx --tsconfig tests/integration/tsconfig.json --test tests/integration/**/*.test.ts

  # Build each architecture on its own native runner and push by digest. Emulating
  # arm64 via QEMU used to deadlock `pnpm install` for hours; native runners avoid it.
  build-image:
    name: Build image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [static-checks, unit, integration]
    # Publish only for release tags (vX.Y.Z) — never for every main commit or PRs.
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Prepare platform slug
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image labels and version
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          target: runner
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            STAMPORAMA_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge the per-architecture digests into a single multi-arch manifest and tag it.
  publish-image:
    name: Publish container image
    runs-on: ubuntu-latest
    needs: [build-image]
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
