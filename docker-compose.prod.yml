# Production / self-hosting stack for Stamporama.
#
# This file is meant to run a pre-built image from GitHub Container Registry on a
# target server (for example a Raspberry Pi). It does NOT build anything locally
# and does NOT run a database — the operator provides an external PostgreSQL via
# DATABASE_URL in the sibling .env file.
#
# You should never need to edit this file. All configuration lives in .env.
# The install script at scripts/install.sh sets this up for you.

services:
  app:
    image: ghcr.io/michalwy/stamporama:${TAG:-latest}
    command: sh -c "pnpm prisma:migrate:deploy && pnpm start"
    env_file:
      - .env
    ports:
      - "${STAMPORAMA_HTTP_PORT:-3000}:3000"
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Optional auto-update watcher. Enabled only when COMPOSE_PROFILES=autoupdate
  # (the install script sets this on request). Watchtower polls GHCR and restarts
  # the app container when a newer image is published.
  watchtower:
    image: containrrr/watchtower
    profiles:
      - autoupdate
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: ${STAMPORAMA_UPDATE_INTERVAL:-3600}
      DOCKER_API_VERSION: ${STAMPORAMA_DOCKER_API_VERSION:-1.44}
    restart: unless-stopped
