services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stamporama
      POSTGRES_USER: stamporama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stamporama}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stamporama"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
      args:
        STAMPORAMA_VERSION: ${STAMPORAMA_VERSION:-dev}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://stamporama:${POSTGRES_PASSWORD:-stamporama}@db:5432/stamporama
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      STAMPORAMA_VERSION: ${STAMPORAMA_VERSION:-dev}
    command: sh -c "pnpm exec prisma migrate deploy && pnpm start"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
