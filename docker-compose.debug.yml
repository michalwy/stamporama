# Memory-debugging overlay for the dev stack. NOT for normal use — layer it on top of the
# dev (and gcs) overlays only when hunting a heap leak:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml \
#     -f docker-compose.gcs.yml -f docker-compose.debug.yml up app
#
# What it enables:
#   --inspect=0.0.0.0:9229      Node inspector, reachable from the host on port 9229, so
#                               Chrome DevTools (chrome://inspect) can take/compare heap
#                               snapshots live. This is the primary tool.
#   --heapsnapshot-signal=...   Write a .heapsnapshot to the process CWD (/app, bind-mounted
#                               → shows up on the host) on SIGUSR2, as a file-based fallback.
#   --max-old-space-size=4096   Raise the heap ceiling so Next's "approaching memory
#                               threshold" auto-restart holds off longer, giving you time to
#                               snapshot while memory is high.
services:
  app:
    environment:
      NODE_OPTIONS: "--inspect=0.0.0.0:9229 --heapsnapshot-signal=SIGUSR2 --max-old-space-size=4096"
    ports:
      - "9229:9229"
